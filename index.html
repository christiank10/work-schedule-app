<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Escala - Março/Abril</title>
    
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4 text-center">
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <button class="btn btn-outline-primary btn-sm" onclick="changeMonth(-1)">❮</button>
                            <h4 id="current-month" class="fw-bold text-primary m-0">Mês</h4>
                            <button class="btn btn-outline-primary btn-sm" onclick="changeMonth(1)">❯</button>
                        </div>

                        <p class="text-muted small">Toque no dia para marcar o trabalho</p>

                        <div id="calendar-grid" class="d-flex flex-wrap justify-content-center gap-2 mb-4">
                            </div>

                        <hr>

                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <div class="text-start">
                                <span class="d-block text-muted small">Total trabalhado</span>
                                <h5 class="fw-bold mb-0"><span id="total-days">0</span> Dias</h5>
                            </div>
                            <button id="reset-btn" class="btn btn-sm btn-outline-danger">Zerar Mês</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
