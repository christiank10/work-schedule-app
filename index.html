<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Escala Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <button class="btn btn-outline-primary rounded-circle" onclick="changeMonth(-1)">‹</button>
            <h2 id="current-month" class="m-0 fw-bold text-primary">Março 2026</h2>
            <button class="btn btn-outline-primary rounded-circle" onclick="changeMonth(1)">›</button>
        </div>

        <div id="calendar-grid" class="d-flex flex-wrap justify-content-center gap-2"></div>

        <div class="mt-4 p-3 border-top d-flex justify-content-between align-items-center">
            <div>
                <small class="text-muted d-block">Total trabalhado</small>
                <span id="total-days" class="h4 fw-bold text-success">0</span> <span class="text-success">Dias</span>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-dark d-flex align-items-center gap-2" onclick="gerarPDF()">
                    PDF <i class="bi bi-file-earmark-pdf"></i>
                </button>
                <button class="btn btn-link text-danger text-decoration-none" onclick="zerarMes()">Zerar Mês</button>
            </div>
        </div>
    </div>

    <div id="area-pdf-print" class="d-none">
        <h2 class="fw-bold m-0">Espelho de Ponto</h2>
        <p id="pdf-periodo-label" class="mb-3 fw-bold" style="font-size: 12px;"></p>
        <table class="table table-bordered border-dark">
            <thead>
                <tr class="table-secondary">
                    <th>Data</th>
                    <th>Dia</th>
                    <th>Entrada</th>
                    <th>S.Alm</th>
                    <th>R.Alm</th>
                    <th>Saída</th>
                </tr>
            </thead>
            <tbody id="table-body-pdf"></tbody>
        </table>
    </div>

    <div class="modal fade" id="timeModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="modalDateTitle">Dia</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label small text-muted">Entrada</label>
                            <input type="time" id="inEnt" class="form-control form-control-lg bg-light">
                        </div>
                        <div class="col-6">
                            <label class="form-label small text-muted">Saída Almoço</label>
                            <input type="time" id="inAlmS" class="form-control form-control-lg bg-light">
                        </div>
                        <div class="col-6">
                            <label class="form-label small text-muted">Retorno Almoço</label>
                            <input type="time" id="inAlmR" class="form-control form-control-lg bg-light">
                        </div>
                        <div class="col-6">
                            <label class="form-label small text-muted">Saída</label>
                            <input type="time" id="inSai" class="form-control form-control-lg bg-light">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 justify-content-between">
                    <button class="btn btn-link text-danger" id="btnRemover">Remover</button>
                    <button class="btn btn-primary px-4" id="btnSalvar">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
